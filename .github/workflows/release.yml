name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  pack-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore ProDispatch.slnx
      - name: Build
        run: dotnet build ProDispatch.slnx --configuration Release --no-restore
      - name: Test
        run: dotnet test ProDispatch.slnx --configuration Release --no-build
      - name: Pack
        run: dotnet pack src/ProDispatch/ProDispatch.csproj --configuration Release --no-build -o ./artifacts
      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
