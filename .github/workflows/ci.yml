name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore ProDispatch.slnx
      - name: Build
        run: dotnet build ProDispatch.slnx --configuration Release --no-restore
      - name: Test
        run: dotnet test ProDispatch.slnx --configuration Release --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=ProDispatch
            -Dsonar.organization=prodispatch
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.coverageReportPaths=**/coverage.cobertura.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
